

<!DOCTYPE html>
<html>
<head>
    <title>ZOMATO</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            background-color: #ff071c;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar a {
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

    
        .nav-links {
            margin-left: auto;  
            display: flex;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }

        .search-box input {
            padding: 5px;
        }

        .search-box button {
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>ZOMATO</h1>

        <div class="nav-links">
            <a href="https://www.zomato.com/">Home</a>
            <a href="https://www.zomato.com/products">Products</a>
            <a href="https://www.zomato.com/cart">Cart</a>
        </div>
        <iframe hrel="https://www.zomato.com/"></iframe>

        <!-- Search -->
        <div class="search-box">
            <input type="text" placeholder="Search">
            <button>🔍</button>
        </div>
    </div>

</body>
</html>
